# CORS 관련 옵션 설정
cors:
  options:
    # allow-credentials가 true이면 "*"를 사용할 수 없다.
    allowed-origins:
      - "*"
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - Origin
      - X-Requested-With
      - Content-Type
      - Accept
      - Authorization
      - Etag
      - If-None-Match
    allow-credentials: false
    max-age: 1
