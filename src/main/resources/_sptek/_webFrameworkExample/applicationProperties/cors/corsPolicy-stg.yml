# CORS 관련 옵션 설정
cors:
  options:
    allowed-origins:
      - http://back.localhost
      - https://back.localhost
      - http://front.localhost
      - https://front.localhost
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - Origin
      - X-Requested-With
      - Content-Type
      - Accept
      - Authorization
      - Etag
      - If-None-Match
    allow-credentials: true
    max-age: 3600
