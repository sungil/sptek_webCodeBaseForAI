################################################################
# fixed properties
log4jdbc:
  spylogdelegator:
    name: net.sf.log4jdbc.log.slf4j.Slf4jSpyLogDelegator
    #name: net.sf.log4jdbc.log.log4j2.Log4j2SpyLogDelegator #(log4j2를 사용하는 경우)

################################################################

web-framework:
  logging:
    req-res-detail:
      # 요청/응답 상세 로그 필터가 ContentCaching wrapper를 적용하지 않고 바로 통과시킬 path pattern 목록
      # 큰 파일 다운로드, 엑셀 export, 이미지/영상 응답처럼 body caching 비용이 큰 endpoint를 지정한다.
      exclude-path-patterns:
        - /download/**
        - /file/**
        - /static/**

      # 요청 Content-Type 기준으로 상세 로그 body caching을 제외할 값 목록
      # 필터 진입 시점에는 응답 Content-Type을 알 수 없으므로, 다운로드 응답 제외는 exclude-path-patterns로 처리한다.
      # 값은 startsWith 기준으로 비교하므로 "image/"처럼 prefix 형태로도 지정할 수 있다.
      exclude-content-types:
        - multipart/form-data
        - application/octet-stream

################################################################

logging:
  level: #log level은 logback config 파일에 그대로 반영됨
    root: info

    com:
      #Framework
      _sptek.__webFramework: debug
      sptek._projectCommon: debug
      sptek.serviceName: debug

      #HikariPool DB 커넥션 풀
      zaxxer.hikari.pool.HikariPool: debug

    org:
      #Mybatis
      mybatis: error #(debug -> sqlSession 처리 과정 확인)
      apache.ibatis: error

      #JPA
      hibernate.SQL: error
      hibernate.type.descriptor.sql.BasicBinder: error

      #Spring
      springframework:
        security: info

    #JDBC (JDBC 및 DB 처리 관련 상세 로그 확인이 필요한 경우 DB 드라이버를 DriverSpy 로 변경 필요)
    jdbc.connection: error
    jdbc.audit: error
    jdbc.sqltiming: error
    jdbc.sqlonly: error
    jdbc.resultset: error
    jdbc.resultsettable: error

  config: classpath:_sptek/_webFrameworkExample/logbackConfig/logback-spring-local.xml
