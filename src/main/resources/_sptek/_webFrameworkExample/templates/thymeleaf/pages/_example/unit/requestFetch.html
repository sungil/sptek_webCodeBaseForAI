<!DOCTYPE html>
<!-- Default Layout Import-->
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{/common/layout/defaultLayout}"
      layout:fragment="Content"
>
<head>
  <title>테스트 페이지</title>

  <!-- inline CSS 영역-->
  <link rel="stylesheet" th:href="@{/css/_example.default.css}">
  <style th:inline="css" type="text/css">
  </style>

  <!-- inline JS 영역-->
  <script th:src="@{/js/_framework/jsencrypt.min.js}" charset="UTF-8" defer></script>
  <script type="module" th:inline="javascript">
    import { requestFetch, rsaEncrypt, API_BASE_URL} from [[@{/js/_framework/frameworkUtil.js}]];
    window.requestFetch = requestFetch;
    window.rsaEncrypt = rsaEncrypt;
    window.apiBaseUrl = API_BASE_URL;
  </script>
</head>

<body>
<div class="base-div">
  <div class="inner-div">
    <b>Client Fetch (js 코드) 사용 예시</b>
  </div>

  <div>
    <label class="label-normal">fetch request with all opts, 모든 옵션 사용의 예시</label> <button class="btn-normal" id="request0">request</button>
    <script>
      document.getElementById('request0').addEventListener('click', function() {
        requestFetch('/systemSupportApi/projectInfo', {
          baseUrl: apiBaseUrl.replace("/api", ""),
          method: 'GET',
          headers: {
            'Authorization': 'Bearer your-token-here',
            'X-Custom-Header': 'my-value'
          },
          body: {
            name: 'Lee sung il',
          },
          query: {
            myParam: 'happy',
          },
          useTimestamp: true,
          timeout: 5000,
          rawResponseOpt: false,
          showErrorAlertOpt: true,
          credentialsOpt: 'include'
        }).then(function(data1) {
          console.log('response 1:', typeof data1 === 'string' ? data1 : JSON.stringify(data1, null, 2));
        }).catch(function(error) {
          console.error("Error in requestFetch:", error);
        });
      });
    </script>
  </div>
  <br>

  <div>
    <label class="label-normal">fetch multiple requests at once, 여러 요청을 동시에 실행</label> <button class="btn-normal" id="request1">request</button>
    <script>
      document.getElementById('request1').addEventListener('click', function() {
        Promise.all([
          requestFetch('/systemSupportApi/projectInfo', {
          }),
          requestFetch('/systemSupportApi/projectInfo', {
          }),
          requestFetch('/systemSupportApi/projectInfo', {
          }),
        ]).then(function(results) {
          const data1 = results[0];
          const data2 = results[1];
          const data3 = results[2];

          alert("All request done")
          console.log('response 1:', typeof data1 === 'string' ? data1 : JSON.stringify(data1, null, 2));
          console.log('response 2:', typeof data2 === 'string' ? data2 : JSON.stringify(data2, null, 2));
          console.log('response 3:', typeof data3 === 'string' ? data3 : JSON.stringify(data3, null, 2));
        }).catch(function(error) {
          console.error("Error in requestFetch:", error);
        });
      });
    </script>
  </div>
  <br>


</div>

</body>
</html>
